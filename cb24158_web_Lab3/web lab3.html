<html>
    <head>
        <link rel="stylesheet" href="cb24158.css">
        <title>Final Examination Re-marking Application Form</title>
    </head>
    <body>
        <a href="https://www.umpsa.edu.my/en">
            <img src="ump.png" alt="Go to ump" width="180">
        </a>
        <div class="userProfile">
            <h5>Welcome</h5>
            <h4>
                <a href="userProfile.html">CB24000</a>
            </h4>
        </div>

        <ul class="navbar">
            <li><a href="userInformation.html">INFORMATION</a></li>
            <li><a href="#">STATUS</a></li>
        </ul>


        <form method="POST">
            <fieldset>
                <legend><img src="Application-Form-C1.png" alt="Application-Form-C1" width="300"></legend>
                <div class="appForm">
                   <table>
                        <tr>
                            <td><label for="nama">Name:</label></td>
                            <td><input type="text" name="nama"></td>
                        </tr>

                        <tr>
                            <td><label for="noMatrik">Matric No:</label></td>
                            <td><input type="text" name="noMatrik"></td>
                        </tr>

                        <tr>
                            <td><label for="phone">HP No.:</label></td>
                            <td><input type="text" name="phone"></td>
                        </tr>

                        <tr>
                            <td><label for="course">Course Name & Code:</label></td>
                            <td><input type="text" name="course"></td>
                        </tr>
                        <tr>
                            <td><label for="status">Current Academic Status:</label></td>
                            <td><input type="text" name="status"></td>
                        </tr>
                        <tr>
                            <td><label for="grade">Grade:</label></td>
                            <td><select name="course">
                                <option value="" selected disabled>Your Grade</option>
                                <option value="A">A</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B">B</option>
                                <option value="B-">B-</option>
                                <option value="C+">C+</option>
                                <option value="C">C</option>
                                <option value="F">F</option>
                            </select></td>
                        </tr>
                        <tr>
                            <td><label for="gpa">GPA:</label></td>

                            <td><select name="gpa">
                                <option value="" selected disabled>GPA</option>
                                <option value="4.0">4.0</option>
                                <option value="3.67">3.67</option>
                                <option value="3.33">3.33</option>
                                <option value="3.00">3.00</option>
                                <option value="2.67">2.67</option>
                                <option value="2.33">2.33</option>
                                <option value="2.00">2.00</option>
                                <option value="0">0</option>
                                </select></td>
                        </tr>
                        <tr>
                            <td><label for="cgpa">CGPA:</label></td>
                            
                            <td><select name="cgpa">
                                <option value="" selected disabled>CGPA</option>
                                <option value="4.0">4.0</option>
                                <option value="3.67">3.67</option>
                                <option value="3.33">3.33</option>
                                <option value="3.00">3.00</option>
                                <option value="2.67">2.67</option>
                                <option value="2.33">2.33</option>
                                <option value="2.00">2.00</option>
                                <option value="0">0</option>
                                </select></td>
                        </tr>
                        <tr>
                            <td><label for="faculty">Fakulti yang menawarkan kursus:</label></td>
                            <td><select name="faculty">
                                <option value="" selected disabled>Faculty</option>
                                <option value="FKOM">FKOM</option>
                                <option value="PBM">PBM</option>
                                <option value="FTKEE">FTKEE</option>
                                <option value="FTKKP">FTKKP</option>
                                <option value="FTKPM">FTKPM</option>
                                <option value="FSTI">FSTI</option>
                                <option value="FIM">FIM</option>
                                <option value="FTKMA">FTKMA</option>
                                <option value="FTKA">FTKA</option>
                                </select></td>
                        </tr>

                        <tr>
                            <td><label for="lecturer">Nama Pensyarah:</label></td>
                            <td><input type="text" name="lecturer"></td>
                        </tr>

                    </table>
                </div>
                <br>
                <div class="button">
                    <input type="submit" value="Submit"> 
                    <input type="reset" value="Reset">
                </div>
            </fieldset>
        </form>
    </body>
</html>
